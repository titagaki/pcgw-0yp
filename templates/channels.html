{{define "content"}}
<h1 class="title">チャンネル一覧</h1>
{{if .Channels}}
<table class="table is-fullwidth is-hoverable">
  <thead><tr><th>ID</th><th>チャンネルID</th><th>開始</th></tr></thead>
  <tbody>
  {{range .Channels}}
  <tr>
    <td><a href="/channels/{{.ID}}">#{{.ID}}</a></td>
    <td><code>{{.GnuID}}</code></td>
    <td>{{formatTime .CreatedAt}}</td>
  </tr>
  {{end}}
  </tbody>
</table>
{{else}}
<p>配信中のチャンネルはありません。</p>
{{end}}
{{end}}
{{template "layout" .}}
