{{define "content"}}
<h1 class="title">ダッシュボード</h1>

{{if .Channels}}
<div class="box">
  <h2 class="subtitle">配信中</h2>
  {{range .Channels}}
  <div class="level">
    <div class="level-left">
      <a href="/channels/{{.ID}}">チャンネル #{{.ID}}</a>
    </div>
    <div class="level-right">
      <span class="tag">{{.GnuID}}</span>
    </div>
  </div>
  {{end}}
</div>
{{end}}

<div class="columns">
  <div class="column">
    <a class="button is-primary is-fullwidth" href="/create">新規配信</a>
  </div>
</div>

{{if .RecentInfos}}
<div class="box">
  <h2 class="subtitle">最近の配信</h2>
  <table class="table is-fullwidth is-hoverable">
    <thead>
      <tr><th>チャンネル名</th><th>ジャンル</th><th>日時</th></tr>
    </thead>
    <tbody>
    {{range .RecentInfos}}
      <tr>
        <td><a href="/programs/{{.ID}}">{{.Channel}}</a></td>
        <td>{{.Genre}}</td>
        <td>{{formatTime .CreatedAt}}</td>
      </tr>
    {{end}}
    </tbody>
  </table>
</div>
{{end}}
{{end}}
{{template "layout" .}}
