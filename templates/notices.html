{{define "content"}}
<h1 class="title">お知らせ</h1>
{{if and .User .User.Admin}}
<a class="button is-primary mb-4" href="/notices/new">新規作成</a>
{{end}}
{{if .Notices}}
{{range .Notices}}
<div class="box">
  <h2 class="subtitle"><a href="/notices/{{.ID}}">{{.Title}}</a></h2>
  <p class="is-size-7 has-text-grey">{{formatTime .CreatedAt}}</p>
</div>
{{end}}
{{else}}
<p>お知らせはありません。</p>
{{end}}
{{end}}
{{template "layout" .}}
